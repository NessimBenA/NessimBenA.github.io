<footer class="site-footer">
  <div class="wrapper">
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title | escape }}. All rights reserved.</p>
    <p>
      <span class="blink">&gt;</span> 
      <span id="typed-text"></span>
      <span class="blink">_</span>
    </p>
  </div>
</footer>

<script>
document.addEventListener('DOMContentLoaded', (event) => {
  const phrases = [
    "Happy hacking!",
    "Stay curious.",
    "Keep exploring.",
    "Code never sleeps.",
    "Hack the planet!"
  ];
  let currentPhrase = 0;
  let i = 0;
  const typedTextSpan = document.getElementById("typed-text");

  function typeWriter() {
    if (i < phrases[currentPhrase].length) {
      typedTextSpan.innerHTML += phrases[currentPhrase].charAt(i);
      i++;
      setTimeout(typeWriter, 50);
    } else {
      setTimeout(eraseText, 2000);
    }
  }

  function eraseText() {
    if (i > 0) {
      typedTextSpan.innerHTML = phrases[currentPhrase].substring(0, i-1);
      i--;
      setTimeout(eraseText, 20);
    } else {
      currentPhrase = (currentPhrase + 1) % phrases.length;
      setTimeout(typeWriter, 500);
    }
  }

  typeWriter();
});
</script>
