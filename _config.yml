# Site settings
title: Nessim's Hideout
email: bbesnessim at gmail dot com with an a in the beginning
description: >-
  A junior mathematician and computer scientist trying
  to learn cool stuff.
baseurl: ""
url: "https://nessimbena.github.io/"
github_username: NessimBenA
author: Nessim 

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Custom collections
collections:
  projects:
    output: true

# Default front matter
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
  -
    scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Disqus comments
disqus:
  shortname: your-disqus-shortname

# Google Analytics
google_analytics: UA-XXXXXXXX-X

# SEO settings
twitter:
  username: your-twitter-username
  card: summary_large_image

social:
  name: Nessim
  links:
    - https://x.com/DavHilbert
    - https://nessimbena.github.io/
    - https://www.linkedin.com/in/nessim-ben-abbes-768a98217/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Search settings
search_enabled: true
search_tokenizer_separator: /[\s/]+/

# Theme settings
hacker_theme:
  date_format: "%Y.%m.%d"
  time_format: "%H:%M:%S"