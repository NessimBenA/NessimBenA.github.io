# Site settings
title: The Hacker's Hideout
email: your-email@example.com
description: >-
  A 90s-style hacker blog exploring the digital frontier, 
  sharing coding adventures and cybersecurity insights.
baseurl: ""
url: "https://your-username.github.io"
github_username: your-github-username
author: Your Hacker Alias

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

# Pagination
paginate: 5
paginate_path: "/blog/page:num/"

# Custom collections
collections:
  projects:
    output: true

# Default front matter
defaults:
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      comments: true
  -
    scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Disqus comments
disqus:
  shortname: your-disqus-shortname

# Google Analytics
google_analytics: UA-XXXXXXXX-X

# SEO settings
twitter:
  username: your-twitter-username
  card: summary_large_image

social:
  name: Your Hacker Alias
  links:
    - https://twitter.com/your-twitter-username
    - https://www.facebook.com/your-facebook-username
    - https://www.linkedin.com/in/your-linkedin-username
    - https://github.com/your-github-username

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Search settings
search_enabled: true
search_tokenizer_separator: /[\s/]+/

# Theme settings
hacker_theme:
  date_format: "%Y.%m.%d"
  time_format: "%H:%M:%S"